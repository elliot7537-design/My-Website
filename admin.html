<!DOCTYPE html>
<html lang="en" translate="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <meta name="google" content="notranslate" />
  <title>Luna UX Mexico — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body>

  <!-- ===== TOP BAR ===== -->
  <header class="admin-bar">
    <div class="admin-bar-inner">
      <a href="index.html" class="admin-logo">
        <span class="logo-mark">▮</span> LUNA UX MEXICO
        <span class="admin-badge">ADMIN</span>
      </a>
      <div class="admin-bar-right">
        <span class="customer-count" id="customer-count">—</span>
        <button class="btn-refresh" id="btn-refresh" title="Refresh">↻</button>
      </div>
    </div>
  </header>

  <!-- ===== STATS ROW ===== -->
  <section class="admin-stats" id="admin-stats">
    <div class="admin-stat">
      <div class="admin-stat-num" id="stat-total">0</div>
      <div class="admin-stat-label">Total</div>
    </div>
    <div class="admin-stat">
      <div class="admin-stat-num" id="stat-new">0</div>
      <div class="admin-stat-label">New</div>
    </div>
    <div class="admin-stat">
      <div class="admin-stat-num" id="stat-progress">0</div>
      <div class="admin-stat-label">In Progress</div>
    </div>
    <div class="admin-stat">
      <div class="admin-stat-num" id="stat-paid">0</div>
      <div class="admin-stat-label">Paid</div>
    </div>
  </section>

  <!-- ===== FILTERS ===== -->
  <section class="admin-filters">
    <input type="search" id="search-input" placeholder="Search by name or email..." />
    <select id="filter-status">
      <option value="">All statuses</option>
      <option value="new">New</option>
      <option value="contacted">Contacted</option>
      <option value="in_progress">In Progress</option>
      <option value="completed">Completed</option>
      <option value="cancelled">Cancelled</option>
    </select>
    <select id="filter-payment">
      <option value="">All payments</option>
      <option value="pending">Pending</option>
      <option value="partial">Partial</option>
      <option value="paid">Paid</option>
    </select>
  </section>

  <!-- ===== CUSTOMER TABLE ===== -->
  <section class="admin-table-wrap">
    <table class="admin-table" id="customer-table">
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Phone</th>
          <th>Service</th>
          <th>Status</th>
          <th>Payment</th>
          <th>Follow-up</th>
          <th>Created</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="customer-tbody">
        <tr><td colspan="9" class="empty-msg">Loading...</td></tr>
      </tbody>
    </table>
  </section>

  <!-- ===== EDIT MODAL ===== -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="edit-modal">
      <div class="modal-header">
        <h3 id="modal-title">Edit Customer</h3>
        <button class="modal-close" id="modal-close">&times;</button>
      </div>
      <form id="edit-form">
        <input type="hidden" name="id" />
        <div class="modal-row">
          <label>Name<input type="text" name="name" required /></label>
          <label>Email<input type="email" name="email" required /></label>
        </div>
        <div class="modal-row">
          <label>Phone<input type="tel" name="phone" /></label>
          <label>Service
            <select name="project_type">
              <option value="brand_identity">Brand Identity</option>
              <option value="web_design">Web Design</option>
              <option value="digital_product">Digital Product</option>
              <option value="creative_strategy">Creative Strategy</option>
              <option value="motion_design">Motion Design</option>
            </select>
          </label>
        </div>
        <div class="modal-row">
          <label>Status
            <select name="status">
              <option value="new">New</option>
              <option value="contacted">Contacted</option>
              <option value="in_progress">In Progress</option>
              <option value="completed">Completed</option>
              <option value="cancelled">Cancelled</option>
            </select>
          </label>
          <label>Payment
            <select name="payment_status">
              <option value="pending">Pending</option>
              <option value="partial">Partial</option>
              <option value="paid">Paid</option>
            </select>
          </label>
        </div>
        <div class="modal-row">
          <label>Follow-up Date<input type="date" name="follow_up_date" /></label>
        </div>
        <label>Notes<textarea name="notes" rows="4"></textarea></label>
        <div class="modal-actions">
          <button type="button" class="btn-delete" id="btn-delete">Delete</button>
          <button type="submit" class="btn-save">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="supabase-config.js"></script>
  <script src="admin.js"></script>
</body>
</html>
